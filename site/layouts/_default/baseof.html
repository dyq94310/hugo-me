<!doctype html>
<html lang="zh-cn">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ block "title" . }}{{ .Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Title }}">
    <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
    <link rel="stylesheet" href="{{ "css/custom.css" | relURL }}">
</head>

<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="site-brand" href="{{ "/" | relURL }}">
                <span class="site-brand__mark">D</span>
                <span>{{ .Site.Title }}</span>
            </a>
            <nav class="site-nav" aria-label="主导航">
                <a href="{{ "/" | relURL }}">首页</a>
                <a href="{{ "/all/" | relURL }}">全部文章</a>
                <a href="{{ "/index.xml" | relURL }}">RSS</a>
            </nav>
        </div>
    </header>
    <main class="site-main">
        {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
        <div class="site-footer__inner">
            <span>© {{ now.Year }} {{ .Site.Title }}</span>
            <span class="site-footer__dot">·</span>
            <span>Powered by Hugo</span>
        </div>
    </footer>

    {{ if .Store.Get "hasMermaid" }}
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
    </script>
    {{ end }}
</body>


</html>
